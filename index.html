<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>오늘 날씨 검색</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="page">
      <section class="search-panel" aria-labelledby="page-title">
        <div>
          <p class="eyebrow">Open-Meteo 날씨 조회</p>
          <h1 id="page-title">오늘 날씨 검색</h1>
          <p class="intro">위치를 입력하면 오늘의 시간별 날씨를 불러와 기온 그래프로 보여줍니다.</p>
        </div>

        <form class="search-form" id="search-form">
          <label for="location">위치</label>
          <div class="search-row">
            <input
              id="location"
              name="location"
              type="search"
              value="서울"
              placeholder="예: 서울, 부산, Tokyo, New York"
              autocomplete="off"
              required
            >
            <button type="submit">검색</button>
          </div>
        </form>
      </section>

      <p class="message error hidden" id="error-message"></p>

      <section class="result-header hidden" id="result-header" aria-label="검색 결과 요약">
        <div>
          <p class="eyebrow">검색 위치</p>
          <h2 id="location-name"></h2>
          <p><span id="timezone"></span> 기준 오늘 예보</p>
        </div>
        <div class="metric-grid">
          <div class="metric">
            <span>최저 기온</span>
            <strong id="min-temperature"></strong>
          </div>
          <div class="metric">
            <span>최고 기온</span>
            <strong id="max-temperature"></strong>
          </div>
        </div>
      </section>

      <section class="chart-section hidden" id="chart-section" aria-labelledby="chart-title">
        <h2 id="chart-title">시간별 기온 그래프</h2>
        <div class="chart-wrap" id="chart"></div>
      </section>

      <section class="table-section hidden" id="table-section" aria-labelledby="table-title">
        <h2 id="table-title">시간별 날씨</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>시간</th>
                <th>기온</th>
                <th>습도</th>
                <th>강수량</th>
                <th>풍속</th>
                <th>날씨</th>
              </tr>
            </thead>
            <tbody id="weather-rows"></tbody>
          </table>
        </div>
      </section>

      <section class="empty-state" id="empty-state" aria-label="초기 안내">
        <h2>검색할 위치를 입력해 주세요</h2>
        <p>도시명, 지역명, 영문 지명 모두 사용할 수 있습니다.</p>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
